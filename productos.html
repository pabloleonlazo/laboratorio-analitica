    <style>
        :root {
            --bg-color: #f4f4f4;
            --border-width: 2px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-color); margin: 0; padding: 0; }
        
        header { background: #fff; border-bottom: var(--border-width) solid #000; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; text-decoration: none; color: #000; }

        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        h1 { font-weight: 800; font-size: 2.5rem; margin-bottom: 30px; }

        .product-list { display: flex; flex-direction: column; gap: 20px; }

        .item-row {
            background: #fff;
            border: var(--border-width) solid #000;
            border-radius: 4px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.1s;
        }

        .item-row:hover { transform: translateX(5px); box-shadow: 5px 0 0 #ff90e8; }

        .item-details h3 { margin: 0; font-size: 1.4rem; }
        .item-details span { color: #666; font-weight: 600; }

        .btn-select {
            background: #000;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 4px;
        }

        footer { border-top: var(--border-width) solid #000; padding: 20px; text-align: center; background: #fff; margin-top: 50px; }
    </style>

        <div class="product-list">

                    <h3>Guía Avanzada de GA4</h3>
