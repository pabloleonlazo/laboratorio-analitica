<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por tu compra! - Labroad</title>
    
    <script>
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
            'event': 'purchase', // Evento estándar de GA4
            'ecommerce': {
                'transaction_id': 'T_' + Math.floor(Math.random() * 10000),
                'value': 19.00,
                'tax': 3.61,
                'shipping': 0,
                'currency': 'USD',
                'items': [{
                    'item_id': 'GA4-AV-001',
                    'item_name': 'Guía Avanzada de GA4',
                    'item_category': 'Ebook',
                    'price': 19.00,
                    'quantity': 1
                }]
            }
        });
    </script>

    

    <style>
        :root { --bg-color: #f4f4f4; --border-width: 2px; --primary-button: #ff90e8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); text-align: center; padding-top: 100px; }
        .card { max-width: 500px; margin: 0 auto; background: #fff; border: var(--border-width) solid #000; border-radius: 4px; padding: 40px; box-shadow: 10px 10px 0 #23a094; }
        h1 { font-size: 2.5rem; font-weight: 800; }
        .order-id { font-family: monospace; background: #eee; padding: 5px; }
        .btn-home { display: inline-block; margin-top: 30px; text-decoration: none; color: #000; font-weight: 700; border: 2px solid #000; padding: 10px 20px; border-radius: 4px; }
    </style>
</head>
<body>
    
    <div class="card">
        <div style="font-size: 4rem;">🎉</div>
        <h1>¡Pedido confirmado!</h1>
        <p>Tu contenido digital ha sido enviado a tu correo.</p>
        <p>ID de transacción: <span class="order-id" id="display-order-id">Cargando...</span></p>
        
        <a href="index.html" class="btn-home">Volver a la tienda</a>
    </div>

    <script>
        // Solo para mostrar el ID visualmente en la web (estético)
        const purchaseData = window.dataLayer.find(x => x.event === 'purchase');
        document.getElementById('display-order-id').innerText = purchaseData.ecommerce.transaction_id;
    </script>
</body>
</html>
